name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/agromech-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: paradedb/paradedb:0.24.2
        env:
          POSTGRES_USER: agromech
          POSTGRES_PASSWORD: agromech
          POSTGRES_DB: agromech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agromech -d agromech_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      AGROMECH_TEST_POSTGRES_URL: postgresql+psycopg://agromech:agromech@localhost:5432/agromech_test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Prepare PostgreSQL search database
        env:
          DATABASE_URL: ${{ env.AGROMECH_TEST_POSTGRES_URL }}
        run: python -m alembic upgrade head

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run checks
        run: scripts/test-all.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_APP_PATH }}'"
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            deploy/docker-compose.prod.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_PATH }}/docker-compose.yml"
          rsync -az -e "ssh -i ~/.ssh/deploy_key" \
            deploy/nginx.agromech.conf \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_APP_PATH }}/nginx.agromech.conf"

      - name: Run retrieval release gates and restart backend
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          DEPLOY_NGINX_SITE_PATH: ${{ secrets.DEPLOY_NGINX_SITE_PATH }}
        run: |
          remote_ghcr_username="$(printf '%q' "${GHCR_USERNAME:-}")"
          remote_ghcr_token="$(printf '%q' "${GHCR_TOKEN:-}")"
          remote_nginx_site_path="$(printf '%q' "${DEPLOY_NGINX_SITE_PATH:-}")"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "GHCR_USERNAME=${remote_ghcr_username} GHCR_TOKEN=${remote_ghcr_token} NGINX_SITE_PATH=${remote_nginx_site_path} bash -se" <<'EOF'
          set -euo pipefail
          cd "${{ secrets.DEPLOY_APP_PATH }}"
          nginx_upstream_path=/etc/nginx/conf.d/agromech-backend-upstream.conf
          active_project_file=.active-backend-project
          : "${NGINX_SITE_PATH:?DEPLOY_NGINX_SITE_PATH must point to the active Agromech Nginx site config}"
          test -r "$NGINX_SITE_PATH" || {
            echo "Nginx site config is not readable: $NGINX_SITE_PATH" >&2
            exit 1
          }
          test -r "$nginx_upstream_path" || {
            echo "Nginx upstream file is not readable: $nginx_upstream_path" >&2
            exit 1
          }
          sudo nginx -t
          active_port="$(sed -nE 's@^[[:space:]]*proxy_pass http://127\\.0\\.0\\.1:([0-9]+)/;[[:space:]]*$@\\1@p' "$nginx_upstream_path")"
          case "$active_port" in
            8000)
              candidate_project=agromech-green
              candidate_port=8001
              ;;
            8001)
              candidate_project=agromech-blue
              candidate_port=8000
              ;;
            *)
              echo "Nginx upstream must contain exactly one loopback backend port (8000 or 8001)" >&2
              exit 1
              ;;
          esac
          active_project="$(cat "$active_project_file" 2>/dev/null || printf '%s' agromech)"
          case "$active_project" in
            agromech|agromech-blue|agromech-green) ;;
            *)
              echo "Unexpected active compose project: $active_project" >&2
              exit 1
              ;;
          esac
          candidate_compose=(docker compose --project-name "$candidate_project")
          candidate_promoted=false
          candidate_cleanup_safe=true
          cleanup_release() {
            if [ "$candidate_promoted" != true ]; then
              if [ "$candidate_cleanup_safe" = true ]; then
                "${candidate_compose[@]}" down --remove-orphans || true
              else
                echo "Candidate slot is preserved for diagnosis; skip candidate cleanup" >&2
              fi
            fi
            rm -f "${upstream_tmp:-}" "${site_backup:-}" "${upstream_backup:-}"
          }
          trap cleanup_release EXIT
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi
          export AGROMECH_BACKEND_IMAGE="${{ steps.image.outputs.name }}:${{ github.sha }}"
          "${candidate_compose[@]}" down --remove-orphans
          "${candidate_compose[@]}" pull
          "${candidate_compose[@]}" run --rm api python -m alembic upgrade head
          "${candidate_compose[@]}" run --rm api python scripts/rebuild-vector-index.py
          "${candidate_compose[@]}" run --rm api sh -ceu '
            : "${RETRIEVAL_BASELINE_PATH:?RETRIEVAL_BASELINE_PATH must be configured for release evaluation}"
            test -r "$RETRIEVAL_BASELINE_PATH" || {
              echo "Retrieval baseline is not readable: $RETRIEVAL_BASELINE_PATH" >&2
              exit 1
            }
            exec python scripts/evaluate-retrieval.py --baseline "$RETRIEVAL_BASELINE_PATH"
          '
          AGROMECH_API_BIND="127.0.0.1:${candidate_port}" "${candidate_compose[@]}" up -d api
          curl --fail --retry 12 --retry-delay 2 --retry-connrefused \
            "http://127.0.0.1:${candidate_port}/health/ready"
          qa_smoke_request="$({
            "${candidate_compose[@]}" exec -T api python -c '
          import json
          from sqlalchemy import select
          from agromech_api.core.config import get_settings
          from agromech_api.core.database import get_engine
          from agromech_api.db.models import evaluation_questions

          settings = get_settings()
          with get_engine().connect() as connection:
              question = connection.execute(
                  select(evaluation_questions.c.question)
                  .where(evaluation_questions.c.dataset_version == settings.evaluation_default_dataset)
                  .order_by(evaluation_questions.c.created_at.asc(), evaluation_questions.c.question_id.asc())
                  .limit(1)
              ).scalar_one_or_none()
          if not question:
              raise SystemExit("QA smoke requires an evaluation question")
          print(json.dumps({"question": question}))
          '
          })"
          qa_smoke_response="$(curl --fail --retry 3 --retry-delay 2 \
            -H 'Content-Type: application/json' \
            --data "$qa_smoke_request" \
            "http://127.0.0.1:${candidate_port}/qa/text")"
          trace_id="$(printf '%s' "$qa_smoke_response" | "${candidate_compose[@]}" exec -T api python -c '
          import json
          import sys

          payload = json.load(sys.stdin)
          if not payload.get("citations"):
              raise SystemExit("QA smoke returned no Citation")
          trace_id = payload.get("trace_id")
          if not trace_id:
              raise SystemExit("QA smoke returned no retrieval trace")
          print(trace_id)
          ')"
          "${candidate_compose[@]}" exec -T -e TRACE_ID="$trace_id" api python -c '
          import os
          from sqlalchemy import select
          from agromech_api.core.database import get_engine
          from agromech_api.db.models import retrieval_logs

          with get_engine().connect() as connection:
              trace = connection.execute(
                  select(retrieval_logs.c.channels, retrieval_logs.c.fusion, retrieval_logs.c.citation_status)
                  .where(retrieval_logs.c.trace_id == os.environ["TRACE_ID"])
              ).mappings().one()
          channels = dict(trace["channels"] or {})
          used = set(channels.get("used") or [])
          if not {"dense", "bm25"}.issubset(used):
              raise SystemExit(f"retrieval smoke missing Dense or BM25: {sorted(used)}")
          fusion = dict(trace["fusion"] or {})
          if not dict(fusion.get("final") or {}).get("rrf_k"):
              raise SystemExit("retrieval smoke missing RRF trace")
          if trace["citation_status"] != "completed" or channels.get("citation", {}).get("status") != "ok":
              raise SystemExit("retrieval smoke Citation trace is not ready")
          '
          "${candidate_compose[@]}" run --rm worker python -c '
          from agromech_worker.main import preflight_dependencies; preflight_dependencies()
          '
          upstream_tmp="$(mktemp)"
          site_backup="$(mktemp)"
          upstream_backup="$(mktemp)"
          cp "$NGINX_SITE_PATH" "$site_backup"
          cp "$nginx_upstream_path" "$upstream_backup"
          printf 'proxy_pass http://127.0.0.1:%s/;\n' "$candidate_port" > "$upstream_tmp"
          rollback_nginx() {
            local rollback_failed=false
            if ! sudo install -m 644 "$site_backup" "$NGINX_SITE_PATH"; then
              echo "Failed to restore Nginx site configuration" >&2
              rollback_failed=true
            fi
            if ! sudo install -m 644 "$upstream_backup" "$nginx_upstream_path"; then
              echo "Failed to restore Nginx upstream configuration" >&2
              rollback_failed=true
            fi
            if ! sudo nginx -t; then
              echo "Restored Nginx configuration did not pass nginx -t" >&2
              rollback_failed=true
            elif ! sudo systemctl reload nginx; then
              echo "Failed to reload Nginx after restoring the previous upstream" >&2
              rollback_failed=true
            fi
            [ "$rollback_failed" = false ]
          }
          restore_active_worker() {
            if [ "$active_project" = "$candidate_project" ]; then
              return 0
            fi
            if ! docker compose --project-name "$active_project" up -d worker; then
              echo "Failed to restart the previous worker" >&2
              return 1
            fi
            if ! docker compose --project-name "$active_project" ps --status running --services | grep -Fx worker; then
              echo "Previous worker is not running after restart" >&2
              return 1
            fi
            return 0
          }
          stop_active_worker() {
            if [ "$active_project" = "$candidate_project" ]; then
              return 0
            fi
            if ! docker compose --project-name "$active_project" stop worker; then
              echo "Failed to stop the previous worker" >&2
              return 1
            fi
            if docker compose --project-name "$active_project" ps --status running --services | grep -Fx worker; then
              echo "Previous worker is still running after stop" >&2
              return 1
            fi
            return 0
          }
          rollback_worker_transition() {
            local rollback_failed=false
            if ! rollback_nginx; then
              rollback_failed=true
            fi
            if ! restore_active_worker; then
              rollback_failed=true
            fi
            if [ "$rollback_failed" = true ]; then
              candidate_cleanup_safe=false
              echo "Worker transition rollback could not be verified; candidate slot is preserved for diagnosis" >&2
              return 1
            fi
            return 0
          }
          if ! sudo install -m 644 nginx.agromech.conf "$NGINX_SITE_PATH" || \
             ! sudo install -m 644 "$upstream_tmp" "$nginx_upstream_path" || \
             ! sudo nginx -t || ! sudo systemctl reload nginx; then
            if rollback_nginx; then
              echo "Nginx cutover failed; previous backend upstream was restored" >&2
            else
              candidate_cleanup_safe=false
              echo "Nginx rollback could not be verified; candidate slot is preserved for diagnosis" >&2
            fi
            exit 1
          fi
          if ! stop_active_worker; then
            if rollback_worker_transition; then
              echo "Previous worker stop failed; previous backend upstream and worker were restored" >&2
            fi
            exit 1
          fi
          if ! "${candidate_compose[@]}" up -d worker || \
             ! "${candidate_compose[@]}" ps --status running --services | grep -Fx worker; then
            if rollback_worker_transition; then
              echo "Candidate worker did not start; previous backend upstream and worker were restored" >&2
            fi
            exit 1
          fi
          candidate_promoted=true
          printf '%s\n' "$candidate_project" > "${active_project_file}.tmp"
          mv "${active_project_file}.tmp" "$active_project_file"
          if [ "$active_project" != "$candidate_project" ]; then
            docker compose --project-name "$active_project" stop api || true
          fi
          EOF

      - name: Upload frontend static files
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            frontend/out/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_FRONTEND_PATH }}/"
