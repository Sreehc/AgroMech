services:
  postgres:
    image: postgres:16-alpine
    container_name: agromech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agromech}
      POSTGRES_USER: ${POSTGRES_USER:-agromech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agromech}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agromech} -d ${POSTGRES_DB:-agromech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: agromech-etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd-data:/etcd

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: agromech-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: agromech-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus-data:/var/lib/milvus

  neo4j:
    image: neo4j:5-community
    container_name: agromech-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-agromech}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-agromech} 'RETURN 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  etcd-data:
  minio-data:
  milvus-data:
  neo4j-data:
  neo4j-logs:
